name: Bump Version

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - 'README.md'
      - '*/README.md'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current version from marketplace
        id: current
        run: |
          VERSION=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: "Bump version (date-based: YY.MDD.N)"
        id: bump
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          
          YEAR=$(date +%y)
          MONTH=$(date +%-m)
          DAY=$(date +%d)
          DATE_PREFIX="$YEAR.$MONTH$DAY"
          
          if [[ "$CURRENT" == "$DATE_PREFIX."* ]]; then
            INCREMENT=$(echo $CURRENT | cut -d. -f3)
            NEW_INCREMENT=$((INCREMENT + 1))
          else
            NEW_INCREMENT=1
          fi
          
          NEW_VERSION="$DATE_PREFIX.$NEW_INCREMENT"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION (previous: $CURRENT)"

      - name: Update marketplace.json
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          
          jq --arg v "$NEW_VERSION" '.metadata.version = $v' .claude-plugin/marketplace.json > tmp.json
          mv tmp.json .claude-plugin/marketplace.json
          
          jq --arg v "$NEW_VERSION" '.plugins[].version = $v' .claude-plugin/marketplace.json > tmp.json
          mv tmp.json .claude-plugin/marketplace.json

      - name: Update plugin.json files
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          
          for plugin_json in */.claude-plugin/plugin.json; do
            if [ -f "$plugin_json" ]; then
              jq --arg v "$NEW_VERSION" '.version = $v' "$plugin_json" > tmp.json
              mv tmp.json "$plugin_json"
              echo "Updated $plugin_json to $NEW_VERSION"
            fi
          done

      - name: Update README.md files
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          
          # Update root README.md
          sed -i "s/\*\*Version:\*\* [0-9]\+\.[0-9]\+\.[0-9]\+/**Version:** $NEW_VERSION/g" README.md
          echo "Updated root README.md"
          
          # Update each tool's README.md
          for readme in */README.md; do
            if [ -f "$readme" ]; then
              sed -i "s/\*\*Version:\*\* [0-9]\+\.[0-9]\+\.[0-9]\+/**Version:** $NEW_VERSION/g" "$readme"
              sed -i "s/Current version: \*\*[0-9]\+\.[0-9]\+\.[0-9]\+\*\*/Current version: **$NEW_VERSION**/g" "$readme"
              echo "Updated $readme"
            fi
          done

      - name: Commit and tag
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json README.md
          find . -path '*/.claude-plugin/plugin.json' -exec git add {} \;
          find . -path '*/README.md' -exec git add {} \;
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin main --tags